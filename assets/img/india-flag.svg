<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 90 60"
  role="img"
  aria-labelledby="india-flag-title india-flag-description"
>
  <title id="india-flag-title">Flag of India</title>

  <desc id="india-flag-description">
    The Indian national flag moving gently in the wind.
  </desc>

  <defs>
    <clipPath id="flag-clip">
      <rect
        x="1"
        y="1"
        width="88"
        height="58"
        rx="3.5"
      />
    </clipPath>

    <linearGradient
      id="cloth-light"
      x1="0"
      y1="0"
      x2="1"
      y2="0"
    >
      <stop
        offset="0"
        stop-color="#ffffff"
        stop-opacity="0.02"
      />

      <stop
        offset="0.26"
        stop-color="#ffffff"
        stop-opacity="0.14"
      />

      <stop
        offset="0.48"
        stop-color="#000000"
        stop-opacity="0.055"
      />

      <stop
        offset="0.72"
        stop-color="#ffffff"
        stop-opacity="0.11"
      />

      <stop
        offset="1"
        stop-color="#000000"
        stop-opacity="0.035"
      />

      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        values="-0.08 0; 0.08 0; -0.08 0"
        dur="12s"
        repeatCount="indefinite"
      />
    </linearGradient>

    <filter
      id="soft-shadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="145%"
    >
      <feDropShadow
        dx="0"
        dy="1.4"
        stdDeviation="1.2"
        flood-color="#000000"
        flood-opacity="0.18"
      />
    </filter>

    <line
      id="chakra-spoke"
      x1="45"
      y1="24.5"
      x2="45"
      y2="29.1"
      stroke="#000080"
      stroke-width="0.5"
      stroke-linecap="round"
    />
  </defs>

  <g
    clip-path="url(#flag-clip)"
    filter="url(#soft-shadow)"
  >
    <!-- Saffron band -->
    <path
      fill="#ff9933"
      d="
        M1 1
        C18 1.4 31 0.2 45 1.1
        C60 2.1 75 0.4 89 1.5
        L89 20.5
        C74 19.3 61 21.1 45 20
        C30 19 17 20.8 1 20
        Z
      "
    >
      <animate
        attributeName="d"
        dur="11s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="
          0.42 0 0.58 1;
          0.42 0 0.58 1
        "
        values="
          M1 1
          C18 1.4 31 0.2 45 1.1
          C60 2.1 75 0.4 89 1.5
          L89 20.5
          C74 19.3 61 21.1 45 20
          C30 19 17 20.8 1 20
          Z;

          M1 1
          C18 0.4 31 1.8 45 0.9
          C60 0 75 1.9 89 0.8
          L89 19.6
          C74 20.8 61 19.1 45 20.2
          C30 21.1 17 19.2 1 20
          Z;

          M1 1
          C18 1.4 31 0.2 45 1.1
          C60 2.1 75 0.4 89 1.5
          L89 20.5
          C74 19.3 61 21.1 45 20
          C30 19 17 20.8 1 20
          Z
        "
      />
    </path>

    <!-- White band -->
    <path
      fill="#ffffff"
      d="
        M1 20
        C17 20.8 30 19 45 20
        C61 21.1 74 19.3 89 20.5
        L89 40.1
        C74 39 60 40.8 45 39.8
        C30 38.9 17 40.7 1 40
        Z
      "
    >
      <animate
        attributeName="d"
        dur="11s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="
          0.42 0 0.58 1;
          0.42 0 0.58 1
        "
        values="
          M1 20
          C17 20.8 30 19 45 20
          C61 21.1 74 19.3 89 20.5
          L89 40.1
          C74 39 60 40.8 45 39.8
          C30 38.9 17 40.7 1 40
          Z;

          M1 20
          C17 19.2 30 21.1 45 20.2
          C61 19.1 74 20.8 89 19.6
          L89 39.4
          C74 40.7 60 39 45 40.1
          C30 41 17 39.3 1 40
          Z;

          M1 20
          C17 20.8 30 19 45 20
          C61 21.1 74 19.3 89 20.5
          L89 40.1
          C74 39 60 40.8 45 39.8
          C30 38.9 17 40.7 1 40
          Z
        "
      />
    </path>

    <!-- Green band -->
    <path
      fill="#138808"
      d="
        M1 40
        C17 40.7 30 38.9 45 39.8
        C60 40.8 74 39 89 40.1
        L89 59
        C74 57.9 60 59.5 45 58.7
        C30 57.8 17 59.4 1 59
        Z
      "
    >
      <animate
        attributeName="d"
        dur="11s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="
          0.42 0 0.58 1;
          0.42 0 0.58 1
        "
        values="
          M1 40
          C17 40.7 30 38.9 45 39.8
          C60 40.8 74 39 89 40.1
          L89 59
          C74 57.9 60 59.5 45 58.7
          C30 57.8 17 59.4 1 59
          Z;

          M1 40
          C17 39.3 30 41 45 40.1
          C60 39 74 40.7 89 39.4
          L89 58.5
          C74 59.5 60 58 45 59
          C30 59.7 17 58.2 1 59
          Z;

          M1 40
          C17 40.7 30 38.9 45 39.8
          C60 40.8 74 39 89 40.1
          L89 59
          C74 57.9 60 59.5 45 58.7
          C30 57.8 17 59.4 1 59
          Z
        "
      />
    </path>

    <!-- Gentle fabric shading -->
    <rect
      x="1"
      y="1"
      width="88"
      height="58"
      fill="url(#cloth-light)"
    />

    <!-- Ashoka Chakra -->
    <g>
      <animateTransform
        attributeName="transform"
        type="translate"
        dur="11s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="
          0.42 0 0.58 1;
          0.42 0 0.58 1
        "
        values="
          0 0;
          0.25 0.18;
          0 0
        "
      />

      <circle
        cx="45"
        cy="30"
        r="6.25"
        fill="none"
        stroke="#000080"
        stroke-width="0.85"
      />

      <circle
        cx="45"
        cy="30"
        r="0.95"
        fill="#000080"
      />

      <use href="#chakra-spoke"/>
      <use href="#chakra-spoke" transform="rotate(15 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(30 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(45 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(60 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(75 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(90 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(105 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(120 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(135 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(150 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(165 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(180 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(195 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(210 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(225 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(240 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(255 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(270 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(285 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(300 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(315 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(330 45 30)"/>
      <use href="#chakra-spoke" transform="rotate(345 45 30)"/>
    </g>
  </g>

  <!-- Thin outline only; no pole or handle -->
  <rect
    x="1"
    y="1"
    width="88"
    height="58"
    rx="3.5"
    fill="none"
    stroke="#657080"
    stroke-width="0.7"
    stroke-opacity="0.52"
  />
</svg>
