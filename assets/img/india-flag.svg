<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 122 68"
  role="img"
  aria-labelledby="flag-title flag-description"
>
  <title id="flag-title">Flag of India</title>
  <desc id="flag-description">
    Animated Indian flag with a fabric-like waving effect
  </desc>

  <defs>
    <clipPath id="flag-clip">
      <path
        d="
          M 10 7
          L 110 7
          Q 117 16 111 25
          Q 117 34 111 43
          Q 117 52 110 61
          L 10 61
          Z
        "
      />
    </clipPath>

    <filter
      id="cloth-wave"
      x="-18%"
      y="-25%"
      width="145%"
      height="155%"
      color-interpolation-filters="sRGB"
    >
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.010 0.060"
        numOctaves="2"
        seed="7"
        result="fabric-noise"
      >
        <animate
          attributeName="baseFrequency"
          dur="2.7s"
          values="
            0.010 0.055;
            0.016 0.078;
            0.012 0.065;
            0.018 0.082;
            0.010 0.055
          "
          repeatCount="indefinite"
        />
      </feTurbulence>

      <feDisplacementMap
        in="SourceGraphic"
        in2="fabric-noise"
        scale="7"
        xChannelSelector="R"
        yChannelSelector="G"
      >
        <animate
          attributeName="scale"
          dur="2.7s"
          values="4;10;6;9;4"
          repeatCount="indefinite"
        />
      </feDisplacementMap>
    </filter>

    <linearGradient
      id="fabric-highlight"
      x1="-1"
      y1="0"
      x2="0"
      y2="0"
    >
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>

      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="2 0"
        dur="3.2s"
        repeatCount="indefinite"
      />
    </linearGradient>

    <linearGradient
      id="pole-gradient"
      x1="0"
      y1="0"
      x2="1"
      y2="0"
    >
      <stop offset="0%" stop-color="#5f6368"/>
      <stop offset="45%" stop-color="#e4e7eb"/>
      <stop offset="100%" stop-color="#55595f"/>
    </linearGradient>
  </defs>

  <rect
    x="4"
    y="2"
    width="4"
    height="64"
    rx="2"
    fill="url(#pole-gradient)"
  />

  <circle
    cx="6"
    cy="3.5"
    r="3.2"
    fill="#d5a328"
  />

  <g filter="url(#cloth-wave)" clip-path="url(#flag-clip)">
    <rect x="9" y="7" width="108" height="18" fill="#ff9933"/>
    <rect x="9" y="25" width="108" height="18" fill="#ffffff"/>
    <rect x="9" y="43" width="108" height="18" fill="#138808"/>

    <g
      fill="none"
      stroke="#000080"
      stroke-width="0.75"
      stroke-linecap="round"
    >
      <circle cx="62" cy="34" r="7.5"/>
      <line x1="63.500" y1="34.000" x2="69.400" y2="34.000" /><line x1="63.449" y1="34.388" x2="69.148" y2="35.915" /><line x1="63.299" y1="34.750" x2="68.409" y2="37.700" /><line x1="63.061" y1="35.061" x2="67.233" y2="39.233" /><line x1="62.750" y1="35.299" x2="65.700" y2="40.409" /><line x1="62.388" y1="35.449" x2="63.915" y2="41.148" /><line x1="62.000" y1="35.500" x2="62.000" y2="41.400" /><line x1="61.612" y1="35.449" x2="60.085" y2="41.148" /><line x1="61.250" y1="35.299" x2="58.300" y2="40.409" /><line x1="60.939" y1="35.061" x2="56.767" y2="39.233" /><line x1="60.701" y1="34.750" x2="55.591" y2="37.700" /><line x1="60.551" y1="34.388" x2="54.852" y2="35.915" /><line x1="60.500" y1="34.000" x2="54.600" y2="34.000" /><line x1="60.551" y1="33.612" x2="54.852" y2="32.085" /><line x1="60.701" y1="33.250" x2="55.591" y2="30.300" /><line x1="60.939" y1="32.939" x2="56.767" y2="28.767" /><line x1="61.250" y1="32.701" x2="58.300" y2="27.591" /><line x1="61.612" y1="32.551" x2="60.085" y2="26.852" /><line x1="62.000" y1="32.500" x2="62.000" y2="26.600" /><line x1="62.388" y1="32.551" x2="63.915" y2="26.852" /><line x1="62.750" y1="32.701" x2="65.700" y2="27.591" /><line x1="63.061" y1="32.939" x2="67.233" y2="28.767" /><line x1="63.299" y1="33.250" x2="68.409" y2="30.300" /><line x1="63.449" y1="33.612" x2="69.148" y2="32.085" />
    </g>

    <circle cx="62" cy="34" r="1.25" fill="#000080"/>

    <rect
      x="9"
      y="7"
      width="108"
      height="54"
      fill="url(#fabric-highlight)"
      opacity="0.65"
    />
  </g>
</svg>
